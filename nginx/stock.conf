server {
    server_name claude.venraas.tw;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3031;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3031;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/claude.venraas.tw/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/claude.venraas.tw/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = claude.venraas.tw) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name claude.venraas.tw;
    return 404; # managed by Certbot
}
